<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Jansuvidhakart</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jansuvidhakart">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
</head>

<body>

<div id="appShell" class="app-shell">
  <header class="header">
    <div class="header-top">
      <div class="logo">Jansuvidhakart</div>
    </div>
    <input type="text" id="search" placeholder="Search apps...">
  </header>

  <div id="categories"></div>

  <section class="section">
    <h2>Featured Apps</h2>
    <div id="featuredApps" class="featured"></div>
  </section>

  <section class="section">
    <h2>All Apps</h2>
    <div id="appContainer"></div>
  </section>
</div>

<script src="script.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker registered successfully:', reg))
      .catch(err => console.log('Service Worker registration failed:', err));
  });
}
</script>

</body>
</html>
