<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Jansuvidhakart</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jansuvidhakart">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
</head>

<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <form id="loginForm">
      <h2>Login Required</h2>
      <p>Enter your ID and password to access the app.</p>
      <input type="text" id="loginId" placeholder="ID" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit">Login</button>
      <p id="loginError" class="login-error"></p>
    </form>

    <div class="divider">OR</div>

    <form id="registerForm">
      <h3>Register New Account</h3>
      <p>₹150 for 1 year access.</p>
      <input type="text" id="registerName" placeholder="Your Name" required>
      <input type="text" id="registerId" placeholder="Choose ID" required>
      <input type="password" id="registerPassword" placeholder="Choose Password" required>
      <button type="submit">Register</button>
      <p id="registerMessage" class="login-error"></p>
    </form>
  </div>
</div>

<div id="appShell" class="app-shell hidden">
  <header class="header">
    <div class="header-top">
      <div class="logo">Jansuvidhakart</div>
      <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
    </div>
    <input type="text" id="search" placeholder="Search apps...">
  </header>

  <div id="categories"></div>

  <section class="section">
    <h2>Featured Apps</h2>
    <div id="featuredApps" class="featured"></div>
  </section>

  <section class="section">
    <h2>All Apps</h2>
    <div id="appContainer"></div>
  </section>
</div>

<script src="script.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker registered successfully:', reg))
      .catch(err => console.log('Service Worker registration failed:', err));
  });
}
</script>

</body>
</html>
