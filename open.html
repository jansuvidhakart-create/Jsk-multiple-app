<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open NovaSphere</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #060816, #10182d);
        color: white;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .box {
        text-align: center;
        padding: 32px;
        border: 1px solid rgba(255,255,255,0.16);
        border-radius: 20px;
        background: rgba(255,255,255,0.06);
        box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      }
      a {
        display: inline-block;
        margin-top: 16px;
        padding: 12px 18px;
        border-radius: 999px;
        background: linear-gradient(90deg, #8b5cf6, #38bdf8);
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>NovaSphere Preview</h1>
      <p>Click below to open the app in your browser.</p>
      <a href="http://localhost:8000/" target="_blank" rel="noopener">Open App</a>
    </div>
  </body>
</html>
